{{- if or (eq (default "" .Values.images.apiService.tag) "") (eq .Values.images.apiService.tag "CHANGE_ME") -}}
{{- fail "images.apiService.tag must be set by Jenkins EXTRA_VALUES or release values" -}}
{{- end -}}
{{- if or (eq (default "" .Values.images.runtimeGateway.tag) "") (eq .Values.images.runtimeGateway.tag "CHANGE_ME") -}}
{{- fail "images.runtimeGateway.tag must be set by Jenkins EXTRA_VALUES or release values" -}}
{{- end -}}
{{- if and (not .Values.secrets.create) (eq (default "" .Values.secrets.name) "") -}}
{{- fail "set secrets.name to an existing Kubernetes Secret or enable secrets.create" -}}
{{- end -}}
{{- if and .Values.secrets.create (or (eq (default "" .Values.secrets.data.apiKey) "") (eq (default "" .Values.secrets.data.internalApiKey) "") (eq (default "" .Values.secrets.data.portalSessionSecret) "")) -}}
{{- fail "secrets.create=true requires non-empty secrets.data.apiKey, secrets.data.internalApiKey, and secrets.data.portalSessionSecret" -}}
{{- end -}}
{{- if eq (len .Values.ingress.apiHosts) 0 -}}
{{- fail "ingress.apiHosts must contain at least one host" -}}
{{- end -}}
{{- if eq (len .Values.ingress.sandboxHosts) 0 -}}
{{- fail "ingress.sandboxHosts must contain at least one host" -}}
{{- end -}}
