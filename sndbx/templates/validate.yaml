{{- if or (eq (default "" .Values.images.apiService.tag) "") (eq .Values.images.apiService.tag "CHANGE_ME") -}}
{{- fail "images.apiService.tag must be set by Jenkins EXTRA_VALUES or release values" -}}
{{- end -}}
{{- if or (eq (default "" .Values.images.runtimeGateway.tag) "") (eq .Values.images.runtimeGateway.tag "CHANGE_ME") -}}
{{- fail "images.runtimeGateway.tag must be set by Jenkins EXTRA_VALUES or release values" -}}
{{- end -}}
{{- if or (eq (default "" .Values.images.dockerDind.tag) "") (eq .Values.images.dockerDind.tag "CHANGE_ME") -}}
{{- fail "images.dockerDind.tag must be set (gVisor DinD image) by Jenkins EXTRA_VALUES or release values" -}}
{{- end -}}
{{- if and (not .Values.secrets.create) (eq (default "" .Values.secrets.name) "") -}}
{{- fail "set secrets.name to an existing Kubernetes Secret or enable secrets.create" -}}
{{- end -}}
{{- if and .Values.secrets.create (or (eq (default "" .Values.secrets.data.apiKey) "") (eq (default "" .Values.secrets.data.internalApiKey) "") (eq (default "" .Values.secrets.data.portalSessionSecret) "")) -}}
{{- fail "secrets.create=true requires non-empty secrets.data.apiKey, secrets.data.internalApiKey, and secrets.data.portalSessionSecret" -}}
{{- end -}}
{{- if eq (len .Values.ingress.apiHosts) 0 -}}
{{- fail "ingress.apiHosts must contain at least one host" -}}
{{- end -}}
{{- if eq (len .Values.ingress.sandboxHosts) 0 -}}
{{- fail "ingress.sandboxHosts must contain at least one host" -}}
{{- end -}}
{{- if and (eq (default "" .Values.database.url) "") (eq (default "" .Values.database.existingSecretName) "") -}}
{{- fail "PostgreSQL is required: set database.url or database.existingSecretName" -}}
{{- end -}}
{{- if and (ne (default "" .Values.database.url) "") (not (or (hasPrefix "postgres://" .Values.database.url) (hasPrefix "postgresql://" .Values.database.url))) -}}
{{- fail "database.url must use postgres:// or postgresql://" -}}
{{- end -}}
{{- $registryLayout := default "auto" .Values.templateRegistry.layout -}}
{{- if not (has $registryLayout (list "auto" "repository_per_template" "single_repository")) -}}
{{- fail "templateRegistry.layout must be auto, repository_per_template, or single_repository" -}}
{{- end -}}
{{- $internalRegistryMode := "auto" -}}
{{- if and .Values.templateRegistry.internal (hasKey .Values.templateRegistry.internal "enabled") -}}
{{- $internalRegistryMode = (toString .Values.templateRegistry.internal.enabled | lower) -}}
{{- end -}}
{{- if not (has $internalRegistryMode (list "auto" "true" "false")) -}}
{{- fail "templateRegistry.internal.enabled must be auto, true, or false" -}}
{{- end -}}
{{- $internalRegistryEnabled := eq (include "sndbx.templateRegistryInternalEnabled" .) "true" -}}
{{- if and .Values.templateRegistry.pushEnabled (eq (default "" .Values.templateRegistry.repoPrefix) "") (not $internalRegistryEnabled) -}}
{{- fail "templateRegistry.pushEnabled=true requires templateRegistry.repoPrefix or templateRegistry.internal.enabled=auto/true" -}}
{{- end -}}
{{- if and .Values.templateRegistry.internal.proxy.enabled (not $internalRegistryEnabled) -}}
{{- fail "templateRegistry.internal.proxy.enabled=true requires the internal template registry to be enabled" -}}
{{- end -}}
{{- if and .Values.templateRegistry.internal.proxy.enabled (or (eq (default "" .Values.templateRegistry.internal.proxy.remoteUrl) "") (eq (default "" .Values.templateRegistry.internal.proxy.remoteServer) "")) -}}
{{- fail "templateRegistry.internal.proxy.enabled=true requires templateRegistry.internal.proxy.remoteUrl and remoteServer" -}}
{{- end -}}
{{- $repoPrefix := default "" .Values.templateRegistry.repoPrefix -}}
{{- if and .Values.templateRegistry.pushEnabled (ne $repoPrefix "") (or (contains "public.ecr.aws" $repoPrefix) (contains ".dkr.ecr." $repoPrefix)) (not .Values.templateRegistry.authRequired) -}}
{{- fail "AWS ECR templateRegistry.repoPrefix requires templateRegistry.authRequired=true with registry credentials, or omit repoPrefix to use the internal registry" -}}
{{- end -}}
{{- $registrySecretName := .Values.templateRegistry.existingSecretName | default .Values.secrets.name -}}
{{- if and (eq (include "sndbx.templateRegistryAuthRequired" .) "true") (not .Values.secrets.create) (eq (default "" $registrySecretName) "") -}}
{{- fail "templateRegistry.authRequired=true requires either secrets.create=true with registryUsername/registryPassword or templateRegistry.existingSecretName/secrets.name" -}}
{{- end -}}
{{- if and (eq (include "sndbx.templateRegistryAuthRequired" .) "true") .Values.secrets.create (eq (default "" .Values.templateRegistry.existingSecretName) "") (or (eq (default "" .Values.secrets.data.registryUsername) "") (eq (default "" .Values.secrets.data.registryPassword) "")) -}}
{{- fail "templateRegistry.authRequired=true with secrets.create=true requires secrets.data.registryUsername and secrets.data.registryPassword" -}}
{{- end -}}
