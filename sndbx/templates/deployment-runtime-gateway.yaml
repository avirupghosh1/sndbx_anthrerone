kind: StatefulSet
apiVersion: {{ .Values.api.deployment | quote }}
metadata:
  name: {{ include "sndbx.runtimeGatewayName" . }}
  namespace: {{ .Values.namespace }}
  labels:
{{ include "sndbx.labels" . | indent 4 }}
spec:
  serviceName: {{ include "sndbx.runtimeGatewayHeadlessName" . }}
  replicas: {{ .Values.replicas.runtimeGateway }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      tier: {{ .Values.tier }}
      component: runtime-gateway
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        tier: {{ .Values.tier }}
        component: runtime-gateway
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum | quote }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum | quote }}
        linkerd.io/inject: {{ .Values.linkerd | default "disabled" | quote }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
      {{- end }}
      containers:
        - name: dockerd
          image: {{ include "sndbx.image" .Values.images.dockerDind }}
          imagePullPolicy: {{ .Values.images.dockerDind.pullPolicy }}
          securityContext:
            privileged: true
          command:
            - dockerd-entrypoint.sh
          args:
            - dockerd
{{ toYaml .Values.runtimeGateway.docker.args | indent 12 }}
            {{- if eq (include "sndbx.templateRegistryInternalEnabled" .) "true" }}
            - --insecure-registry={{ include "sndbx.templateRegistryServer" . }}
            {{- end }}
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -fsS http://127.0.0.1:2375/_ping >/dev/null
            initialDelaySeconds: {{ .Values.runtimeGateway.docker.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.runtimeGateway.docker.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.runtimeGateway.docker.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.runtimeGateway.docker.readinessProbe.failureThreshold }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -fsS http://127.0.0.1:2375/_ping >/dev/null
            initialDelaySeconds: {{ .Values.runtimeGateway.docker.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.runtimeGateway.docker.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.runtimeGateway.docker.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.runtimeGateway.docker.livenessProbe.failureThreshold }}
          resources:
{{ toYaml .Values.runtimeGateway.docker.resources | indent 12 }}
        - name: runtime-gateway
          image: {{ include "sndbx.image" .Values.images.runtimeGateway }}
          imagePullPolicy: {{ .Values.images.runtimeGateway.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.runtimeGateway.httpPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sndbx.runtimeGatewayName" . }}-config
          env:
            - name: CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sndbx.secretName" . }}
                  key: INTERNAL_API_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sndbx.secretName" . }}
                  key: INTERNAL_API_KEY
            - name: GATEWAY_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TEMPLATE_REGISTRY_SERVER
              value: {{ include "sndbx.templateRegistryServer" . | quote }}
            {{- $registrySecretName := .Values.templateRegistry.existingSecretName | default (include "sndbx.secretName" .) }}
            {{- if eq (include "sndbx.templateRegistryAuthRequired" .) "true" }}
            - name: TEMPLATE_REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $registrySecretName }}
                  key: {{ .Values.templateRegistry.usernameSecretKey | quote }}
            - name: TEMPLATE_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $registrySecretName }}
                  key: {{ .Values.templateRegistry.passwordSecretKey | quote }}
            {{- end }}
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: {{ .Values.runtimeGateway.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.runtimeGateway.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.runtimeGateway.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.runtimeGateway.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.runtimeGateway.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.runtimeGateway.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.runtimeGateway.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.runtimeGateway.livenessProbe.failureThreshold }}
          resources:
{{ toYaml .Values.runtimeGateway.resources | indent 12 }}
      volumes:
        - name: docker-graph
          emptyDir: {}
