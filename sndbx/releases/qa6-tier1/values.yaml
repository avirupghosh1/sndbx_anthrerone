tier: qa6-tier1
namespace: spr-apps
releaseName: sndbx-qa6-tier1
branchName: master
k8sClusterName: apps-gke
cloudProvider: gcp

# QA6 CI pushes to Artifact Registry (asia-south1-docker.pkg.dev/gc-qa6/gc-qa6).
# The chart default spr-nexus credential is for prod-nexus and can break GAR pulls.
imagePullSecrets: []

replicas:
  apiService: 1
  runtimeGateway: 3

database:
  existingSecretName: sndbx-qa6-tier1-secret
  existingSecretKey: DATABASE_URL
  typeExistingSecretKey: DATABASE_TYPE
  usernameExistingSecretKey: DATABASE_USERNAME
  passwordExistingSecretKey: DATABASE_PASSWORD

images:
  apiService:
    repo: prod-nexus.sprinklr.com:8123
    name: api-service
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  runtimeGateway:
    repo: prod-nexus.sprinklr.com:8123
    name: runtime-gateway
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  dockerDind:
    repo: prod-nexus.sprinklr.com:8123
    name: dockerd-gvisor
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  templateRegistry:
    repo: prod-nexus.sprinklr.com:8123
    name: template-registry
    tag: CHANGE_ME
    pullPolicy: IfNotPresent

apiService:
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "3"
      memory: 4Gi

runtimeGateway:
  resources:
    requests:
      cpu: "500m"
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  docker:
    resources:
      requests:
        cpu: "1500m"
        memory: 3Gi
      limits:
        cpu: "4"
        memory: 8Gi

templateRegistry:
  pushEnabled: true
  authRequired: false
  repoPrefix: ""
  layout: auto
  server: ""
  existingSecretName: ""
  internal:
    enabled: true

config:
  apiService:
    SANDBOX_DATA_PLANE_DOMAIN: "sndbx.sprinklr.com"
    SANDBOX_DATA_PLANE_SCHEME: "https"
    SANDBOX_WARM_POOL_SIZE: "2"
  runtimeGateway:
    SANDBOX_DOMAIN: "sndbx.sprinklr.com"

ingress:
  apiHosts:
    - api.sndbx.sprinklr.com
  sandboxHosts:
    - "*.sndbx.sprinklr.com"
  tls:
    enabled: true
    secretName: sndbx-sprinklr-com-tls
    hosts:
      - api.sndbx.sprinklr.com
      - "*.sndbx.sprinklr.com"

secrets:
  create: false
  name: sndbx-qa6-tier1-secret
