apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-service
  namespace: sandboxes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proxy-service
  template:
    metadata:
      labels:
        app: proxy-service
    spec:
      containers:
        - name: proxy-service
          image: proxy-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: proxy-service-config
          env:
            - name: CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: CONTROL_PLANE_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-service-config
  namespace: sandboxes
data:
  SANDBOX_DOMAIN: "sndbx.com"
  SANDBOX_INGRESS_DEBUG: "false"
  CONTROL_PLANE_URL: "http://api-service:8000"
  K8S_NAMESPACE: "sandboxes"
  K8S_POD_SERVICE_TEMPLATE: "sandbox-{sandbox_id}.{namespace}.svc.cluster.local"
  UPSTREAM_RESOLVE_MODE: "k8s_dns"
  PORT: "8080"
  HOST: "0.0.0.0"
