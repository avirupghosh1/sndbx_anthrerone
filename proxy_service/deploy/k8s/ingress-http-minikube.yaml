# HTTP ingress for Mac minikube (no TLS). Requires: minikube addons enable ingress
# and ``minikube tunnel`` in a separate terminal (binds ingress LB to 127.0.0.1).
#
#   kubectl apply -f deploy/k8s/proxy-service.yaml
#   kubectl apply -f deploy/k8s/ingress-http-minikube.yaml
#
# Add to /etc/hosts (one line):  127.0.0.1 api.sndbx.com
# Guest traffic uses Host headers (8765-sb-….sndbx.com) via SANDBOX_DATA_PLANE_URL.
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-service
  namespace: sandboxes
spec:
  selector:
    app: proxy-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-ingress
  namespace: sandboxes
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.sndbx.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
    - host: "*.sndbx.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxy-service
                port:
                  number: 8080
