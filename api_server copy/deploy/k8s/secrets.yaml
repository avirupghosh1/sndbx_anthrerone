# Copy to secrets.yaml, set a strong API_KEY, then: kubectl apply -f deploy/k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-secrets
  namespace: sandboxes
type: Opaque
stringData:
  API_KEY: "test-key-12345"
  CONTROL_PLANE_API_KEY: "test-key-12345"
  INGRESS_ACCESS_TOKEN: "test-ingress-token"
