# Control plane (api-service). Apply before proxy_service/deploy/k8s/ingress.yaml
#   kubectl apply -f deploy/k8s/secrets.yaml   # create from secrets.yaml.example first
#   kubectl apply -f deploy/k8s/api-service.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: sandboxes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-controller
  namespace: sandboxes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-controller
  namespace: sandboxes
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "services"]
    verbs: ["create", "delete", "get", "list", "watch", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["create", "delete", "get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-controller
  namespace: sandboxes
subjects:
  - kind: ServiceAccount
    name: sandbox-controller
    namespace: sandboxes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-controller
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-service-data
  namespace: sandboxes
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: sandboxes
spec:
  selector:
    app: api-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: sandboxes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      serviceAccountName: sandbox-controller
      containers:
        - name: api-service
          image: api-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: api-service-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: API_KEY
          volumeMounts:
            - name: data
              mountPath: /var/lib/api

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: api-service-data

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-service-config
  namespace: sandboxes
data:
  API_SERVICE_ROLE: "control"
  SANDBOX_ENGINE: "k8s"
  SANDBOX_RUNTIME: "k8s"
  
  TEMPLATE_DOCKERFILE_BUILD_MODE: "kaniko"
  SANDBOX_DATA_PLANE_ENABLED: "true"
  SANDBOX_DATA_PLANE_DOMAIN: "sndbx.com"
  SANDBOX_DATA_PLANE_SCHEME: "http"
  SANDBOX_DATA_PLANE_DEBUG: "false"
  K8S_NAMESPACE: "sandboxes"
  K8S_POD_SERVICE_TEMPLATE: "sandbox-{sandbox_id}.{namespace}.svc.cluster.local"
  SANDBOX_ISOLATION: "gvisor"
  SANDBOX_WARM_POOL_SIZE: "3"
  ENVD_ALWAYS_ON: "true"
  ENVD_PUBLISH_PORT: "false"
  DATABASE_PATH: "/var/lib/api/sandboxes.db"
  PORT: "8000"
  HOST: "0.0.0.0"
