# API code is copied into the image at **build** time (see Dockerfile: COPY . .).
# There is no bind-mount of Python sources, so `docker compose up -d` alone reuses the
# last built image. After `git pull` or any handler change (e.g. snapshot routes), rebuild:
#   docker compose up -d --build
# or: docker compose build api && docker compose up -d
# (docker-compose v1: same with `docker-compose` instead of `docker compose`.)
#
# For Lima / Colima VM sandboxes (SANDBOX_ISOLATION=lima), run the API **on the host** instead
# so ``limactl`` is on PATH: ``./scripts/run_api_host.sh`` — see docs/LIMA_SANDBOX.md.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:?Set API_KEY in your environment or .env file}
      - DEBUG=false
      - DATABASE_PATH=/data/sandboxes.db
      - LOG_LEVEL=INFO
      # Used by docker-entrypoint.sh to pre-pull before Uvicorn starts (avoids huge in-request pulls).
      - DEFAULT_TEMPLATE=python:3.11
      - PREPULL_TEMPLATE=python:3.11
      # Warm pool (Docker only). Variable name must be SANDBOX_WARM_POOL_SIZE (not WARM_POOL_*).
      # Export on host before `up`, e.g. `export SANDBOX_WARM_POOL_SIZE=4`, or set in a `.env` next to this file.
      - SANDBOX_WARM_POOL_SIZE=${SANDBOX_WARM_POOL_SIZE:-0}
      - SANDBOX_WARM_POOL_TEMPLATE_ID=${SANDBOX_WARM_POOL_TEMPLATE_ID:-python:3.11}
      - SANDBOX_WARM_POOL_CPU=${SANDBOX_WARM_POOL_CPU:-1}
      - SANDBOX_WARM_POOL_MEMORY=${SANDBOX_WARM_POOL_MEMORY:-512m}
      - SANDBOX_WARM_POOL_TIMEOUT=${SANDBOX_WARM_POOL_TIMEOUT:-3600}
      # gVisor: set SANDBOX_ISOLATION=gvisor; runsc must exist on the daemon (see docs/SANDBOX_BACKENDS_FUTURE.md).
      # docker | firecracker (Firecracker requires Linux+KVM on the API host — see docs/FIRECRACKER.md)
      - SANDBOX_ENGINE=${SANDBOX_ENGINE:-docker}
      - SANDBOX_ISOLATION=${SANDBOX_ISOLATION:-docker}
      - SANDBOX_DOCKER_OCI_RUNTIME=${SANDBOX_DOCKER_OCI_RUNTIME:-}
      # Target a remote Linux VM's Docker (see docs/REMOTE_SANDBOX_VM.md). When set, prefer removing the socket mount
      # or ensure DOCKER_HOST wins over the default socket inside the container.
      # - DOCKER_HOST=${DOCKER_HOST:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - api_data:/data
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 180s

networks:
  sandbox-net:
    driver: bridge

volumes:
  api_data:
    driver: local
