{{- if .Values.ingress.enabled }}
kind: Ingress
apiVersion: {{ .Values.api.ingress | quote }}
metadata:
  name: {{ include "sndbx.fullname" . }}-ingress
  namespace: {{ .Values.namespace }}
  labels:
{{ include "sndbx.labels" . | indent 4 }}
  annotations:
{{ toYaml .Values.ingress.annotations | indent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
  {{- range .Values.ingress.apiHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sndbx.apiServiceName" $ }}
                port:
                  number: {{ $.Values.service.apiService.port }}
  {{- end }}
  {{- range .Values.ingress.sandboxHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sndbx.runtimeGatewayName" $ }}
                port:
                  number: {{ $.Values.service.runtimeGateway.httpPort }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - secretName: {{ .Values.ingress.tls.secretName | quote }}
      hosts:
{{ toYaml .Values.ingress.tls.hosts | indent 8 }}
  {{- end }}
{{- end }}
