{{- if eq (include "agent-sandbox.templateRegistryInternalEnabled" .) "true" }}
apiVersion: {{ .Values.api.service | quote }}
kind: Service
metadata:
  name: {{ include "agent-sandbox.templateRegistryDeploymentName" . }}
  namespace: {{ .Values.namespace }}
  labels:
{{ include "agent-sandbox.labels" . | indent 4 }}
    component: template-registry
spec:
  type: ClusterIP
  selector:
    app: {{ .Chart.Name }}
    tier: {{ .Values.tier }}
    component: template-registry
  ports:
    - name: registry
      port: {{ .Values.templateRegistry.internal.servicePort }}
      targetPort: registry
      protocol: TCP
---
apiVersion: {{ .Values.api.deployment | quote }}
kind: Deployment
metadata:
  name: {{ include "agent-sandbox.templateRegistryDeploymentName" . }}
  namespace: {{ .Values.namespace }}
  labels:
{{ include "agent-sandbox.labels" . | indent 4 }}
    component: template-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      tier: {{ .Values.tier }}
      component: template-registry
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        tier: {{ .Values.tier }}
        component: template-registry
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      containers:
        - name: registry
          image: {{ include "agent-sandbox.templateRegistryImage" . | quote }}
          imagePullPolicy: {{ tpl (.Values.templateRegistry.internal.pullPolicy | toString) . }}
          ports:
            - name: registry
              containerPort: {{ .Values.templateRegistry.internal.servicePort }}
              protocol: TCP
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            {{- if .Values.templateRegistry.internal.proxy.enabled }}
            - name: REGISTRY_PROXY_REMOTEURL
              value: {{ .Values.templateRegistry.internal.proxy.remoteUrl | quote }}
            {{- $registrySecretName := .Values.templateRegistry.existingSecretName | default (include "agent-sandbox.secretName" .) }}
            {{- if eq (include "agent-sandbox.templateRegistryAuthRequired" .) "true" }}
            - name: REGISTRY_PROXY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $registrySecretName }}
                  key: {{ .Values.templateRegistry.usernameSecretKey | quote }}
            - name: REGISTRY_PROXY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $registrySecretName }}
                  key: {{ .Values.templateRegistry.passwordSecretKey | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
{{ toYaml .Values.templateRegistry.internal.resources | indent 12 }}
      volumes:
        - name: registry-data
          emptyDir: {}
{{- end }}
