{{- if .Values.podDisruptionBudget.enabled }}
kind: PodDisruptionBudget
apiVersion: {{ .Values.api.poddisruptionbudget | quote }}
metadata:
  name: {{ include "agent-sandbox.apiServiceName" . }}-pdb
  namespace: {{ .Values.namespace }}
  labels:
{{ include "agent-sandbox.labels" . | indent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.apiService.minAvailable }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      tier: {{ .Values.tier }}
      component: api-service
---
kind: PodDisruptionBudget
apiVersion: {{ .Values.api.poddisruptionbudget | quote }}
metadata:
  name: {{ include "agent-sandbox.runtimeGatewayName" . }}-pdb
  namespace: {{ .Values.namespace }}
  labels:
{{ include "agent-sandbox.labels" . | indent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.runtimeGateway.minAvailable }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      tier: {{ .Values.tier }}
      component: runtime-gateway
{{- end }}
