kind: Deployment
apiVersion: {{ .Values.api.deployment | quote }}
metadata:
  name: {{ include "sndbx.apiServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
{{ include "sndbx.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicas.apiService }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      tier: {{ .Values.tier }}
      component: api-service
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        tier: {{ .Values.tier }}
        component: api-service
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum | quote }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum | quote }}
        linkerd.io/inject: {{ .Values.linkerd | default "disabled" | quote }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
      {{- end }}
      containers:
        - name: api-service
          image: {{ include "sndbx.image" .Values.images.apiService }}
          imagePullPolicy: {{ .Values.images.apiService.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.apiService.port }}
              protocol: TCP
            - name: ssh
              containerPort: {{ .Values.service.apiService.sshPort }}
              protocol: TCP
            - name: modal-grpc
              containerPort: {{ .Values.service.apiService.modalGrpcPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sndbx.apiServiceName" . }}-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sndbx.secretName" . }}
                  key: API_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sndbx.secretName" . }}
                  key: INTERNAL_API_KEY
            - name: RUNTIME_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sndbx.secretName" . }}
                  key: INTERNAL_API_KEY
            - name: PORTAL_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sndbx.secretName" . }}
                  key: PORTAL_SESSION_SECRET
            - name: API_SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- $databaseSecretName := toString (default "" (.Values.database.existingSecretName | default .Values.secrets.name)) }}
            {{- if and (eq $databaseSecretName "") .Values.secrets.create }}
            {{- $databaseSecretName = include "sndbx.secretName" . }}
            {{- end }}
            {{- if $databaseSecretName }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $databaseSecretName }}
                  key: {{ .Values.database.existingSecretKey | quote }}
            {{- else }}
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- end }}
            {{- if $databaseSecretName }}
            - name: DATABASE_TYPE
              valueFrom:
                secretKeyRef:
                  name: {{ $databaseSecretName }}
                  key: {{ .Values.database.typeExistingSecretKey | quote }}
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $databaseSecretName }}
                  key: {{ .Values.database.usernameExistingSecretKey | quote }}
                  optional: true
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $databaseSecretName }}
                  key: {{ .Values.database.passwordExistingSecretKey | quote }}
                  optional: true
            {{- else }}
            - name: DATABASE_TYPE
              value: {{ .Values.database.type | quote }}
            - name: DATABASE_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: DATABASE_PASSWORD
              value: {{ .Values.database.password | quote }}
            {{- end }}
            {{- $imageBuildingSecretName := .Values.imageBuilding.existingSecretName | default (include "sndbx.secretName" .) }}
            {{- if eq (include "sndbx.imageBuildingAuthRequired" .) "true" }}
            - name: IMAGE_BUILDING_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ $imageBuildingSecretName }}
                  key: {{ .Values.imageBuilding.bucketSecretKey | quote }}
            - name: IMAGE_BUILDING_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ $imageBuildingSecretName }}
                  key: {{ .Values.imageBuilding.regionSecretKey | quote }}
            - name: IMAGE_BUILDING_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $imageBuildingSecretName }}
                  key: {{ .Values.imageBuilding.accessKeyIdSecretKey | quote }}
            - name: IMAGE_BUILDING_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $imageBuildingSecretName }}
                  key: {{ .Values.imageBuilding.secretAccessKeySecretKey | quote }}
            - name: IMAGE_BUILDING_S3_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $imageBuildingSecretName }}
                  key: {{ .Values.imageBuilding.sessionTokenSecretKey | quote }}
                  optional: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: {{ .Values.apiService.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.apiService.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.apiService.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.apiService.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.apiService.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.apiService.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.apiService.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.apiService.livenessProbe.failureThreshold }}
          resources:
{{ toYaml .Values.apiService.resources | indent 12 }}
