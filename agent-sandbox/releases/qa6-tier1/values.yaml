tier: tier1
namespace: spr-apps
releaseName: agent-sandbox-qa6-tier1
branchName: master
k8sClusterName: apps-gke
cloudProvider: gcp

replicas:
  apiService: 1
  runtimeGateway: 3

database:
  existingSecretName: agent-sandbox-qa6-tier1-secret
  existingSecretKey: DATABASE_URL
  typeExistingSecretKey: DATABASE_TYPE
  usernameExistingSecretKey: DATABASE_USERNAME
  passwordExistingSecretKey: DATABASE_PASSWORD

images:
  apiService:
    repo: prod-nexus.sprinklr.com:8123
    name: api-service
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  runtimeGateway:
    repo: prod-nexus.sprinklr.com:8123
    name: runtime-gateway
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  dockerDind:
    repo: prod-nexus.sprinklr.com:8123
    name: dockerd-gvisor
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  templateRegistry:
    repo: prod-nexus.sprinklr.com:8123
    name: registry
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  

apiService:
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "3"
      memory: 4Gi

runtimeGateway:
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
    packingTarget: 4
    scaleDownStabilizationWindowSeconds: 900
    scaleDownPeriodSeconds: 300
    scaleUpStabilizationWindowSeconds: 0
    scaleUpPeriodSeconds: 60
  resources:
    requests:
      cpu: "500m"
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  docker:
    resources:
      requests:
        cpu: "1500m"
        memory: 3Gi
      limits:
        cpu: "4"
        memory: 8Gi

templateRegistry:
  pushEnabled: true
  authRequired: false
  repoPrefix: ""
  layout: auto
  server: ""
  existingSecretName: ""
  internal:
    enabled: true

imageBuilding:
  authRequired: false
  existingSecretName: agent-sandbox-qa6-tier1-secret

config:
  apiService:
    SANDBOX_DATA_PLANE_DOMAIN: "qa6-agent-sandbox.sprinklr.com"
    SANDBOX_DATA_PLANE_SCHEME: "https"
    SANDBOX_WARM_POOL_SIZE: "2"
  runtimeGateway:
    SANDBOX_DOMAIN: "qa6-agent-sandbox.sprinklr.com"

ingress:
  apiHosts:
    - api.qa6-agent-sandbox.sprinklr.com
  sandboxHosts:
    - "*.qa6-agent-sandbox.sprinklr.com"

secrets:
  create: false
  name: agent-sandbox-qa6-tier1-secret
