api:
  deployment: apps/v1
  ingress: networking.k8s.io/v1
  poddisruptionbudget: policy/v1
  service: v1
  configmap: v1
  secret: v1
  serviceaccount: v1

namespace: spr-apps
tier: tier1
replicas:
  apiService: 1
  runtimeGateway: 1
linkerd: disabled
cloudProvider: gcp
k8sClusterName: apps-gke
chartName: agent-sandbox
releaseName: agent-sandbox-tier1
branchName: master
releaseVersion: NA
itopsTicket: NA
buildJobUrl: NA

imagePullSecrets:
  - spr-nexus

database:
  # Production reads database settings from the app Secret by default.
  # DATABASE_TYPE must be postgres or mongo. DATABASE_URL can be a full DSN or
  # a host/path endpoint. For MongoDB, DATABASE_USERNAME may be empty only
  # when auth is disabled or the username is already present in DATABASE_URL.
  type: ""
  url: ""
  username: ""
  password: ""
  existingSecretName: ""
  existingSecretKey: DATABASE_URL
  typeExistingSecretKey: DATABASE_TYPE
  usernameExistingSecretKey: DATABASE_USERNAME
  passwordExistingSecretKey: DATABASE_PASSWORD

serviceAccount:
  create: true
  name: sandbox-controller

images:
  apiService:
    repo: prod-nexus.sprinklr.com:8123
    name: api-service
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  runtimeGateway:
    repo: prod-nexus.sprinklr.com:8123
    name: runtime-gateway
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  # dockerd sidecar for runtime-gateway. This is the gVisor-enabled DinD image
  # built from runtime-gateway/Dockerfile.gvisor (docker:29-dind + runsc).
  # CI sets repo/name/tag via EXTRA_VALUES; tag stays CHANGE_ME until then.
  dockerDind:
    repo: prod-nexus.sprinklr.com:8123
    name: dockerd-gvisor
    tag: CHANGE_ME
    pullPolicy: IfNotPresent
  templateRegistry:
    repo: prod-nexus.sprinklr.com:8123
    name: registry
    tag: "3"
    pullPolicy: IfNotPresent

service:
  apiService:
    port: 8000
    sshPort: 2222
    modalGrpcPort: 50051
  runtimeGateway:
    httpPort: 8080

apiService:
  resources:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 5

runtimeGateway:
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
    packingTarget: 4
    scaleDownStabilizationWindowSeconds: 900
    scaleDownPeriodSeconds: 300
    scaleUpStabilizationWindowSeconds: 0
    scaleUpPeriodSeconds: 60
  resources:
    requests:
      cpu: "250m"
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 5
  docker:
    args:
      - --host=tcp://127.0.0.1:2375
      - --storage-driver=overlay2
      - --tls=false
    resources:
      requests:
        cpu: "1000m"
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 8Gi
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 6
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 5
    graphCapacityBytes: "53687091200"

config:
  apiService:
    ENVIRONMENT: "production"
    CORS_ALLOW_CREDENTIALS: "false"
    AUTH_BEARER_API_KEYS_ENABLED: "true"
    PORTAL_REGISTRATION_ENABLED: "false"
    PORTAL_SESSION_TTL_HOURS: "12"
    API_SERVICE_ROLE: "control"
    SANDBOX_ENGINE: "docker"
    SANDBOX_RUNTIME: "docker"
    TEMPLATE_DOCKERFILE_BUILD_MODE: "docker_cli"
    TEMPLATE_BUILD_VIA_RUNTIME_GATEWAY: "true"
    RUNTIME_GATEWAY_URL: "http://{{ include \"agent-sandbox.runtimeGatewayServiceFqdn\" . }}:8080"
    SANDBOX_DATA_PLANE_ENABLED: "true"
    SANDBOX_DATA_PLANE_DOMAIN: "agent-sandbox.example.com"
    SANDBOX_DATA_PLANE_SCHEME: "https"
    SANDBOX_DATA_PLANE_DEBUG: "false"
    SANDBOX_DEFAULT_ALLOW_PUBLIC_TRAFFIC: "false"
    DAYTONA_OBJECT_STORAGE_URL: ""
    DAYTONA_SSH_GATEWAY_ENABLED: "true"
    DAYTONA_SSH_GATEWAY_HOST: "0.0.0.0"
    DAYTONA_SSH_GATEWAY_PORT: "{{ .Values.service.apiService.sshPort }}"
    DAYTONA_SSH_GATEWAY_PUBLIC_HOST: ""
    DAYTONA_SSH_GATEWAY_PUBLIC_PORT: "{{ .Values.service.apiService.sshPort }}"
    DAYTONA_SSH_ACCESS_DEFAULT_TTL_MIN: "60"
    DAYTONA_SSH_ACCESS_MAX_TTL_MIN: "1440"
    MODAL_COMPAT_GATEWAY_ENABLED: "true"
    MODAL_COMPAT_GATEWAY_HOST: "0.0.0.0"
    MODAL_COMPAT_GATEWAY_PORT: "{{ .Values.service.apiService.modalGrpcPort }}"
    MODAL_COMPAT_GATEWAY_PUBLIC_URL: ""
    MODAL_COMPAT_GATEWAY_PUBLIC_HOST: ""
    SANDBOX_LEASE_REAPER_INTERVAL_SEC: "5"
    SANDBOX_STATE_RECONCILE_INTERVAL_SEC: "10"
    SANDBOX_LOST_RETENTION_SEC: "86400"
    RUNTIME_EXITED_CONTAINER_RETENTION_SEC: "1800"
    TEMPLATE_IMAGE_RETENTION_SEC: "172800"
    OBSERVABILITY_RETENTION_HOURS: "24"
    OBSERVABILITY_SAMPLE_INTERVAL_SEC: "30.0"
    OBSERVABILITY_SAMPLER_ENABLED: "true"
    # Isolation defaults to plain Docker (runc). gVisor is opt-in per release:
    # set SANDBOX_ISOLATION=gvisor (or SANDBOX_DOCKER_OCI_RUNTIME=runsc). The
    # images.dockerDind image is gVisor-capable either way (runsc unused under runc).
    SANDBOX_ISOLATION: "docker"
    SANDBOX_DOCKER_OCI_RUNTIME: ""
    SANDBOX_WARM_POOL_SIZE: "5"
    SANDBOX_WARM_POOL_PROVISION_CONCURRENCY: "2"
    SANDBOX_WARM_POOL_ACQUIRE_WAIT_SEC: "0.0"
    SANDBOX_WARM_POOL_IDLE_POLL_SEC: "0.25"
    GUEST_BOOTSTRAP_AGENT_WAIT_SEC: "30.0"
    SANDBOX_COLD_CREATE_READY_WAIT_SEC: "0.0"
    SANDBOX_ROUTE_READY_WAIT_SEC: "12.0"
    SANDBOX_WARM_POOL_INFLIGHT_STALE_SEC: "300.0"
    ENVD_ALWAYS_ON: "true"
    ENVD_PUBLISH_PORT: "false"
    PORT: "8000"
    HOST: "0.0.0.0"
    RUNTIME_GATEWAY_NAMESPACE: "{{ .Values.namespace }}"
    RUNTIME_GATEWAY_SHARD_COUNT: "{{ .Values.replicas.runtimeGateway }}"
    RUNTIME_GATEWAY_TARGET_DISCOVERY_MODE: "{{ ternary \"kubernetes\" \"static\" .Values.runtimeGateway.autoscaling.enabled }}"
    RUNTIME_GATEWAY_STATEFULSET_SCALE_DOWN_AWARE: "{{ .Values.runtimeGateway.autoscaling.enabled }}"
    RUNTIME_GATEWAY_STATEFULSET_PACKING_TARGET: "{{ .Values.runtimeGateway.autoscaling.packingTarget }}"
    RUNTIME_GATEWAY_POD_DELETION_COST_ENABLED: "{{ .Values.runtimeGateway.autoscaling.enabled }}"
    RUNTIME_GATEWAY_POD_DELETION_COST_INTERVAL_SEC: "15.0"
    RUNTIME_GATEWAY_POD_DISCOVERY_TTL_SEC: "5.0"
    RUNTIME_GATEWAY_POD_METRICS_ENABLED: "true"
    RUNTIME_GATEWAY_POD_LABEL_SELECTOR: "app={{ .Chart.Name }},tier={{ .Values.tier }},component=runtime-gateway"
    RUNTIME_GATEWAY_POD_LABEL_APP: "{{ .Chart.Name }}"
    RUNTIME_GATEWAY_POD_LABEL_TIER: "{{ .Values.tier }}"
    RUNTIME_GATEWAY_POD_LABEL_COMPONENT: "runtime-gateway"
    RUNTIME_GATEWAY_STATEFULSET_NAME: "{{ include \"agent-sandbox.runtimeGatewayName\" . }}"
    RUNTIME_GATEWAY_HEADLESS_SERVICE: "{{ include \"agent-sandbox.runtimeGatewayHeadlessName\" . }}"
    RUNTIME_GATEWAY_SERVICE_PORT: "{{ .Values.service.runtimeGateway.httpPort }}"
    API_SERVICE_INSTANCE_ID: ""
    WARM_POOL_COORDINATOR_LEASE_NAME: "warm-pool-coordinator"
    WARM_POOL_USE_K8S_LEASE: "false"
    WARM_POOL_COORDINATOR_LEASE_TTL_SEC: "15"
    RUNTIME_GATEWAY_STATUS_CACHE_TTL_SEC: "2.0"
    IMAGE_BUILDING_AUTH_REQUIRED: "{{ .Values.imageBuilding.authRequired }}"
    IMAGE_BUILDING_S3_PREFIX: "{{ .Values.imageBuilding.s3.prefix }}"
    IMAGE_BUILDING_S3_ENDPOINT_URL: "{{ .Values.imageBuilding.s3.endpointUrl }}"
  
  runtimeGateway:
    SANDBOX_DOMAIN: "agent-sandbox.example.com"
    SANDBOX_INGRESS_DEBUG: "false"
    CONTROL_PLANE_URL: "http://{{ include \"agent-sandbox.apiServiceFqdn\" . }}:8000"
    CONTROL_PLANE_TIMEOUT_SEC: "10"
    DOCKER_HOST: "tcp://127.0.0.1:2375"
    SANDBOX_DOCKER_OCI_RUNTIME: "{{ .Values.config.apiService.SANDBOX_DOCKER_OCI_RUNTIME }}"
    ENVD_EMBED_AT_TEMPLATE_BUILD: "true"
    UPSTREAM_RESOLVE_MODE: "control_plane"
    K8S_NAMESPACE: "{{ .Values.namespace }}"
    PORT: "8080"
    HOST: "0.0.0.0"
    DOCKER_GRAPH_PATH: "/var/lib/docker"
    DOCKER_GRAPH_CAPACITY_BYTES: "{{ .Values.runtimeGateway.docker.graphCapacityBytes }}"
    TEMPLATE_REGISTRY_PUSH_ENABLED: "{{ .Values.templateRegistry.pushEnabled }}"
    TEMPLATE_REGISTRY_REPO_PREFIX: "{{ include \"agent-sandbox.templateRegistryRepoPrefix\" . }}"
    TEMPLATE_REGISTRY_AUTH_REQUIRED: "{{ include \"agent-sandbox.templateRegistryAuthRequired\" . }}"
    TEMPLATE_REGISTRY_LAYOUT: "{{ .Values.templateRegistry.layout }}"
    TEMPLATE_REGISTRY_CACHE_ENABLED: "{{ .Values.templateRegistry.internal.proxy.enabled }}"
    TEMPLATE_REGISTRY_CACHE_SERVER: "{{ include \"agent-sandbox.templateRegistryServer\" . }}"
    TEMPLATE_REGISTRY_CACHE_UPSTREAM_SERVER: "{{ .Values.templateRegistry.internal.proxy.remoteServer }}"

templateRegistry:
  # Production default: save built templates in the chart-managed in-cluster
  # registry pod, avoiding external registry credentials.
  pushEnabled: true
  authRequired: false
  repoPrefix: ""
  # auto keeps registry/repository-per-template refs unless an explicit external
  # registry layout is configured later.
  layout: auto
  server: ""
  existingSecretName: ""
  usernameSecretKey: TEMPLATE_REGISTRY_USERNAME
  passwordSecretKey: TEMPLATE_REGISTRY_PASSWORD
  internal:
    # auto enables the in-cluster registry when pushEnabled=true and repoPrefix is empty.
    # Set false to require an external registry; set true to force the internal registry.
    enabled: auto
    # Backward-compatible full image override. Prefer images.templateRegistry
    # for normal Helm/Jenkins releases.
    image: ""
    pullPolicy: "{{ .Values.images.templateRegistry.pullPolicy }}"
    servicePort: 5000
    proxy:
      # Optional pull-through cache mode. Use this only when the internal registry
      # should front an upstream registry.
      enabled: false
      remoteUrl: ""
      remoteServer: ""
    resources:
      requests:
        cpu: "100m"
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi

imageBuilding:
  # Optional S3-backed storage for SDK-uploaded image build contexts.
  # false keeps the default database-backed object storage path.
  authRequired: false
  existingSecretName: ""
  bucketSecretKey: IMAGE_BUILDING_S3_BUCKET
  regionSecretKey: IMAGE_BUILDING_S3_REGION
  accessKeyIdSecretKey: IMAGE_BUILDING_S3_ACCESS_KEY_ID
  secretAccessKeySecretKey: IMAGE_BUILDING_S3_SECRET_ACCESS_KEY
  sessionTokenSecretKey: IMAGE_BUILDING_S3_SESSION_TOKEN
  s3:
    prefix: template-build-contexts
    endpointUrl: ""

secrets:
  create: false
  name: ""
  data:
    apiKey: ""
    internalApiKey: ""
    adminApiKey: ""
    authJwtSecret: ""
    portalSessionSecret: ""
    databaseType: ""
    databaseUrl: ""
    databaseUsername: ""
    databasePassword: ""
    registryUsername: ""
    registryPassword: ""
    imageBuildingS3Bucket: ""
    imageBuildingS3Region: ""
    imageBuildingS3AccessKeyId: ""
    imageBuildingS3SecretAccessKey: ""
    imageBuildingS3SessionToken: ""

ingress:
  enabled: true
  className: ingress-nginx-office
  annotations:
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "1g"
  apiHosts:
    - api.agent-sandbox.example.com
  sandboxHosts:
    - "*.agent-sandbox.example.com"
  tls:
    # Production follows the Prism chart flow: rely on ingress class / ACME
    # automation from kubernetes.io/tls-acme instead of rendering an explicit
    # TLS secret. Set enabled=true only for local/manual deployments that
    # pre-create a Secret.
    enabled: false
    secretName: ""
    hosts: []

podDisruptionBudget:
  enabled: true
  apiService:
    minAvailable: 1
  runtimeGateway:
    minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
