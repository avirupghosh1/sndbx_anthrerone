apiVersion: v1
kind: Service
metadata:
  name: runtime-gateway
  namespace: sandboxes
spec:
  selector:
    app: runtime-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: docker
      port: 2375
      targetPort: 2375
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-gateway
  namespace: sandboxes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runtime-gateway
  template:
    metadata:
      labels:
        app: runtime-gateway
    spec:
      containers:
        - name: dockerd
          image: docker:27-dind
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          args:
            - --host=tcp://0.0.0.0:2375
            - --storage-driver=overlay2
            - --tls=false
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          ports:
            - containerPort: 2375
              name: docker
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
          readinessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 15
            periodSeconds: 15
        - name: gateway
          image: runtime-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: runtime-gateway-config
          env:
            - name: CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: CONTROL_PLANE_API_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: CONTROL_PLANE_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: docker-graph
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-gateway-config
  namespace: sandboxes
data:
  SANDBOX_DOMAIN: "sndbx.com"
  SANDBOX_INGRESS_DEBUG: "false"
  CONTROL_PLANE_URL: "http://api-service:8000"
  CONTROL_PLANE_TIMEOUT_SEC: "10"
  DOCKER_HOST: "tcp://127.0.0.1:2375"
  ENVD_EMBED_AT_TEMPLATE_BUILD: "true"
  UPSTREAM_RESOLVE_MODE: "control_plane"
  PORT: "8080"
  HOST: "0.0.0.0"
