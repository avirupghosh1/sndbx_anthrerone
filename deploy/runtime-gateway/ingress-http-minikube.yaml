# HTTP ingress for the runtime gateway architecture on Mac minikube.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-ingress
  namespace: sandboxes
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.sndbx.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
    - host: "*.sndbx.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: runtime-gateway
                port:
                  number: 8080
