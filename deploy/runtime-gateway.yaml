apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: sandboxes
spec:
  selector:
    app: registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: sandboxes
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: sandboxes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: registry
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-gateway
  namespace: sandboxes
spec:
  selector:
    app: runtime-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-gateway-headless
  namespace: sandboxes
spec:
  clusterIP: None
  selector:
    app: runtime-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: runtime-gateway
  namespace: sandboxes
spec:
  serviceName: runtime-gateway-headless
  replicas: 3
  selector:
    matchLabels:
      app: runtime-gateway
  template:
    metadata:
      labels:
        app: runtime-gateway
    spec:
      containers:
        - name: dockerd
          image: dockerd-gvisor:28
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - dockerd-entrypoint.sh
          args:
            - dockerd
            - --host=tcp://127.0.0.1:2375
            - --storage-driver=overlay2
            - --tls=false
            - --insecure-registry=registry.sandboxes.svc.cluster.local:5000
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - docker --host tcp://127.0.0.1:2375 info >/dev/null 2>&1
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - docker --host tcp://127.0.0.1:2375 info >/dev/null 2>&1
            initialDelaySeconds: 15
            timeoutSeconds: 3
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "4"
              memory: "2Gi"
        - name: gateway
          image: runtime-gateway:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
              readOnly: true
          envFrom:
            - configMapRef:
                name: runtime-gateway-config
          env:
            - name: CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: INTERNAL_API_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: INTERNAL_API_KEY
            - name: GATEWAY_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: docker-graph
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-gateway-config
  namespace: sandboxes
data:
  SANDBOX_DOMAIN: "sndbx.example.com"
  SANDBOX_INGRESS_DEBUG: "false"
  CONTROL_PLANE_URL: "http://api-service.sandboxes.svc.cluster.local:8000"
  CONTROL_PLANE_TIMEOUT_SEC: "10"
  DOCKER_HOST: "tcp://127.0.0.1:2375"
  SANDBOX_DOCKER_OCI_RUNTIME: ""
  ENVD_EMBED_AT_TEMPLATE_BUILD: "true"
  UPSTREAM_RESOLVE_MODE: "control_plane"
  K8S_NAMESPACE: "sandboxes"
  PORT: "8080"
  HOST: "0.0.0.0"
  DOCKER_GRAPH_PATH: "/var/lib/docker"
  # Minikube's default storage provisioner backs every PVC from the same node filesystem,
  # so statvfs(/var/lib/docker) is identical for all shards. Use the declared local PVC
  # capacity so scheduling sees per-shard Docker graph usage during local validation.
  DOCKER_GRAPH_CAPACITY_BYTES: "53687091200"
  TEMPLATE_REGISTRY_PUSH_ENABLED: "true"
  TEMPLATE_REGISTRY_REPO_PREFIX: "registry.sandboxes.svc.cluster.local:5000/templates"
  TEMPLATE_REGISTRY_SERVER: "registry.sandboxes.svc.cluster.local:5000"
  TEMPLATE_REGISTRY_AUTH_REQUIRED: "false"
  TEMPLATE_REGISTRY_LAYOUT: "auto"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-ingress
  namespace: sandboxes
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.sndbx.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
    - host: "*.sndbx.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: runtime-gateway
                port:
                  number: 8080
  tls:
    - hosts:
        - api.sndbx.example.com
        - "*.sndbx.example.com"
      secretName: sndbx-example-com-tls
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: runtime-gateway
  namespace: sandboxes
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: runtime-gateway
