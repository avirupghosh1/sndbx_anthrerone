apiVersion: v1
kind: Namespace
metadata:
  name: sandboxes
---
# Local/manual deploy defaults only. Do not use this Secret for Helm/Jenkins
# production releases; create the environment Secret from your real vault values.
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-secrets
  namespace: sandboxes
type: Opaque
stringData:
  API_KEY: "sbx-local-dev-key"
  INTERNAL_API_KEY: "internal-local-dev-key"
  PORTAL_SESSION_SECRET: "local-dev-portal-session-secret-change-me"
  DATABASE_TYPE: "mongo"
  DATABASE_URL: "mongodb://host.minikube.internal:27017/sandboxes"
  DATABASE_USERNAME: ""
  DATABASE_PASSWORD: ""
