apiVersion: v1
kind: Namespace
metadata:
  name: sandboxes
---
# Local/manual deploy defaults only. Do not use this Secret for Helm/Jenkins
# production releases; create the environment Secret from your real vault values.
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-secrets
  namespace: sandboxes
type: Opaque
stringData:
  API_KEY: "local-api-key-change-me-000000000001"
  INTERNAL_API_KEY: "local-internal-key-change-me-0000001"
  ADMIN_API_KEY: "local-admin-key-change-me-000000001"
  AUTH_JWT_SECRET: "local-auth-jwt-secret-change-me-000001"
  PORTAL_SESSION_SECRET: "local-portal-session-secret-change-001"
  DATABASE_TYPE: "mongo"
  DATABASE_URL: "mongodb://host.minikube.internal:27017/sandboxes"
  DATABASE_USERNAME: ""
  DATABASE_PASSWORD: ""
