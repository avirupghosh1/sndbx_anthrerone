apiVersion: v1
kind: Service
metadata:
  name: runtime-gateway
  namespace: sandboxes
spec:
  selector:
    app: runtime-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: docker
      port: 2375
      targetPort: 2375
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runtime-gateway-docker-graph
  namespace: sandboxes
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-gateway
  namespace: sandboxes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runtime-gateway
  template:
    metadata:
      labels:
        app: runtime-gateway
    spec:
      containers:
        - name: dockerd
          image: docker:27-dind
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          args:
            - --host=tcp://0.0.0.0:2375
            - --storage-driver=overlay2
            - --tls=false
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          ports:
            - containerPort: 2375
              name: docker
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
          readinessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
        - name: gateway
          image: runtime-gateway:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: runtime-gateway-config
          env:
            - name: CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: CONTROL_PLANE_API_KEY
            - name: INGRESS_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: INGRESS_ACCESS_TOKEN
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: docker-graph
          persistentVolumeClaim:
            claimName: runtime-gateway-docker-graph
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-gateway-config
  namespace: sandboxes
data:
  SANDBOX_DOMAIN: "sndbx.example.com"
  SANDBOX_INGRESS_DEBUG: "false"
  CONTROL_PLANE_URL: "http://api-service.sandboxes.svc.cluster.local:8000"
  CONTROL_PLANE_TIMEOUT_SEC: "10"
  UPSTREAM_RESOLVE_MODE: "control_plane"
  PORT: "8080"
  HOST: "0.0.0.0"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-ingress
  namespace: sandboxes
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.sndbx.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
    - host: "*.sndbx.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: runtime-gateway
                port:
                  number: 8080
  tls:
    - hosts:
        - api.sndbx.example.com
        - "*.sndbx.example.com"
      secretName: sndbx-example-com-tls
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: runtime-gateway
  namespace: sandboxes
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: runtime-gateway
