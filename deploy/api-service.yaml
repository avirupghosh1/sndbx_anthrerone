apiVersion: v1
kind: Namespace
metadata:
  name: sandboxes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-controller
  namespace: sandboxes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-controller-runtime-gateway-discovery
  namespace: sandboxes
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - patch
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-controller-runtime-gateway-discovery
  namespace: sandboxes
subjects:
  - kind: ServiceAccount
    name: sandbox-controller
    namespace: sandboxes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-controller-runtime-gateway-discovery
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: sandboxes
spec:
  selector:
    app: api-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: ssh
      port: 2222
      targetPort: 2222
    - name: modal-grpc
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: sandboxes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      serviceAccountName: sandbox-controller
      containers:
        - name: api-service
          image: api-service:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 2222
              name: ssh
            - containerPort: 50051
              name: modal-grpc
          envFrom:
            - configMapRef:
                name: api-service-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: API_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: INTERNAL_API_KEY
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: ADMIN_API_KEY
            - name: RUNTIME_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: INTERNAL_API_KEY
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: AUTH_JWT_SECRET
            - name: PORTAL_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: PORTAL_SESSION_SECRET
            - name: API_SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DATABASE_TYPE
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: DATABASE_TYPE
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: DATABASE_URL
                  optional: true
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: DATABASE_USERNAME
                  optional: true
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: DATABASE_PASSWORD
                  optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            timeoutSeconds: 3
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "500Mi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-service-config
  namespace: sandboxes
data:
  ENVIRONMENT: "development"
  CORS_ALLOW_CREDENTIALS: "false"
  AUTH_BEARER_API_KEYS_ENABLED: "true"
  PORTAL_REGISTRATION_ENABLED: "true"
  PORTAL_SESSION_TTL_HOURS: "720"
  API_SERVICE_ROLE: "control"
  SANDBOX_ENGINE: "docker"
  SANDBOX_RUNTIME: "gvisor"
  TEMPLATE_DOCKERFILE_BUILD_MODE: "docker_cli"
  TEMPLATE_BUILD_VIA_RUNTIME_GATEWAY: "true"
  RUNTIME_GATEWAY_URL: "http://runtime-gateway.sandboxes.svc.cluster.local:8080"
  SANDBOX_DATA_PLANE_ENABLED: "true"
  SANDBOX_DATA_PLANE_DOMAIN: "sndbx.example.com"
  SANDBOX_DATA_PLANE_SCHEME: "https"
  SANDBOX_DATA_PLANE_DEBUG: "false"
  SANDBOX_DEFAULT_ALLOW_PUBLIC_TRAFFIC: "false"
  DAYTONA_OBJECT_STORAGE_URL: "https://api.sndbx.example.com"
  DAYTONA_SSH_GATEWAY_ENABLED: "true"
  DAYTONA_SSH_GATEWAY_HOST: "0.0.0.0"
  DAYTONA_SSH_GATEWAY_PORT: "2222"
  DAYTONA_SSH_GATEWAY_PUBLIC_HOST: "127.0.0.1"
  DAYTONA_SSH_GATEWAY_PUBLIC_PORT: "2222"
  DAYTONA_SSH_ACCESS_DEFAULT_TTL_MIN: "60"
  DAYTONA_SSH_ACCESS_MAX_TTL_MIN: "1440"
  MODAL_COMPAT_GATEWAY_ENABLED: "true"
  MODAL_COMPAT_GATEWAY_HOST: "0.0.0.0"
  MODAL_COMPAT_GATEWAY_PORT: "50051"
  MODAL_COMPAT_GATEWAY_PUBLIC_URL: "http://127.0.0.1:50051"
  SANDBOX_LEASE_REAPER_INTERVAL_SEC: "5"
  SANDBOX_STATE_RECONCILE_INTERVAL_SEC: "10"
  SANDBOX_LOST_RETENTION_SEC: "86400"
  RUNTIME_EXITED_CONTAINER_RETENTION_SEC: "1800"
  TEMPLATE_IMAGE_RETENTION_SEC: "172800"
  OBSERVABILITY_RETENTION_HOURS: "24"
  OBSERVABILITY_SAMPLE_INTERVAL_SEC: "30.0"
  OBSERVABILITY_SAMPLER_ENABLED: "true"
  SANDBOX_ISOLATION: "gvisor"
  SANDBOX_DOCKER_OCI_RUNTIME: ""
  SANDBOX_WARM_POOL_SIZE: "4"
  SANDBOX_WARM_POOL_TEMPLATE_ID: "python:3.11"
  SANDBOX_WARM_POOL_PROVISION_CONCURRENCY: "2"
  SANDBOX_WARM_POOL_ACQUIRE_WAIT_SEC: "0.0"
  SANDBOX_WARM_POOL_IDLE_POLL_SEC: "0.25"
  GUEST_BOOTSTRAP_AGENT_WAIT_SEC: "30.0"
  SANDBOX_COLD_CREATE_READY_WAIT_SEC: "0.0"
  SANDBOX_ROUTE_READY_WAIT_SEC: "12.0"
  SANDBOX_WARM_POOL_INFLIGHT_STALE_SEC: "300.0"
  ENVD_ALWAYS_ON: "true"
  ENVD_PUBLISH_PORT: "false"
  DATABASE_TYPE: "mongo"
  DATABASE_URL: "mongodb://host.minikube.internal:27017/sandboxes"
  MONGODB_DATABASE: "sandboxes"
  PORT: "8000"
  HOST: "0.0.0.0"
  RUNTIME_GATEWAY_NAMESPACE: "sandboxes"
  RUNTIME_GATEWAY_SHARD_COUNT: "1"
  RUNTIME_GATEWAY_TARGET_DISCOVERY_MODE: "kubernetes"
  RUNTIME_GATEWAY_STATEFULSET_SCALE_DOWN_AWARE: "true"
  RUNTIME_GATEWAY_STATEFULSET_PACKING_TARGET: "4"
  RUNTIME_GATEWAY_POD_DELETION_COST_ENABLED: "true"
  RUNTIME_GATEWAY_POD_DELETION_COST_INTERVAL_SEC: "15.0"
  RUNTIME_GATEWAY_POD_DISCOVERY_TTL_SEC: "5.0"
  RUNTIME_GATEWAY_POD_METRICS_ENABLED: "true"
  RUNTIME_GATEWAY_POD_LABEL_SELECTOR: "app=runtime-gateway"
  RUNTIME_GATEWAY_POD_LABEL_APP: "runtime-gateway"
  RUNTIME_GATEWAY_POD_LABEL_TIER: ""
  RUNTIME_GATEWAY_POD_LABEL_COMPONENT: ""
  RUNTIME_GATEWAY_STATEFULSET_NAME: "runtime-gateway"
  RUNTIME_GATEWAY_HEADLESS_SERVICE: "runtime-gateway-headless"
  RUNTIME_GATEWAY_SERVICE_PORT: "8080"
  API_SERVICE_INSTANCE_ID: ""
  WARM_POOL_COORDINATOR_LEASE_NAME: "warm-pool-coordinator"
  WARM_POOL_USE_K8S_LEASE: "true"
  WARM_POOL_COORDINATOR_LEASE_TTL_SEC: "15"
  RUNTIME_GATEWAY_STATUS_CACHE_TTL_SEC: "2.0"
  API_READY_EXECUTOR_TIMEOUT_SEC: "0.75"
  SANDBOX_CREATE_QUEUE_TIMEOUT_SEC: "2.0"
  SANDBOX_CREATE_REQUEST_TIMEOUT_SEC: "120.0"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-service
  namespace: sandboxes
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-service
